<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koiii POS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#1c2330;
  --card:    #21262d;
  --border:  #30363d;
  --accent:  #e85d30;
  --gold:    #f0a830;
  --green:   #3fb950;
  --blue:    #58a6ff;
  --red:     #f85149;
  --text:    #e6edf3;
  --muted:   #7d8590;
  --dim:     #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-left {
  display: flex; align-items: center; gap: 12px;
}
.header-logo {
  font-family: 'Prompt', sans-serif;
  font-size: 1.1rem; font-weight: 800;
  color: var(--accent);
}
.header-badge {
  font-size: 0.72rem;
  background: rgba(232,93,48,0.12);
  border: 1px solid rgba(232,93,48,0.3);
  color: var(--accent);
  border-radius: 20px;
  padding: 2px 10px;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-back {
  font-size: 0.82rem;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-family: 'Sarabun', sans-serif;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-back:hover { color: var(--text); border-color: var(--accent); }
.last-update { font-size: 0.75rem; color: var(--dim); }

/* MAIN */
main { padding: 24px; max-width: 1100px; margin: 0 auto; }

/* DATE FILTER */
.date-filter {
  display: flex; gap: 8px; margin-bottom: 24px;
  flex-wrap: wrap; align-items: center;
}
.date-filter label { font-size: 0.82rem; color: var(--muted); }
.date-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
}
.date-input:focus { outline: none; border-color: var(--accent); }
.btn-filter {
  background: var(--accent);
  border: none; border-radius: 8px;
  padding: 7px 16px;
  color: white;
  font-family: 'Sarabun', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-filter:hover { filter: brightness(1.1); }
.btn-today {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  color: var(--muted);
  font-family: 'Sarabun', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-today:hover { color: var(--text); border-color: var(--accent); }

/* STAT CARDS */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.revenue::before { background: var(--accent); }
.stat-card.bills::before   { background: var(--blue); }
.stat-card.avg::before     { background: var(--gold); }
.stat-card.topitem::before { background: var(--green); }

.stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
.stat-label {
  font-size: 0.78rem; color: var(--muted);
  margin-bottom: 4px;
}
.stat-value {
  font-family: 'Prompt', sans-serif;
  font-size: 1.6rem; font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.blue   { color: var(--blue); }
.stat-value.gold   { color: var(--gold); }
.stat-value.green  { color: var(--green); }
.stat-sub {
  font-size: 0.72rem; color: var(--dim);
  margin-top: 4px;
}

/* SECTIONS */
.section-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 700px) {
  .section-grid { grid-template-columns: 1fr; }
}

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}
.section-title {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-family: 'Prompt', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.section-body { padding: 14px 18px; }

/* HOURLY CHART */
.chart-wrap {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 120px;
  padding: 0 4px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.bar {
  width: 100%;
  background: rgba(232,93,48,0.3);
  border-radius: 4px 4px 0 0;
  min-height: 2px;
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  cursor: pointer;
}
.bar:hover { background: var(--accent); }
.bar-tooltip {
  display: none;
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.7rem;
  white-space: nowrap;
  color: var(--text);
  pointer-events: none;
  margin-bottom: 4px;
  z-index: 10;
}
.bar:hover .bar-tooltip { display: block; }
.bar-label {
  font-size: 0.6rem;
  color: var(--dim);
  white-space: nowrap;
}

/* TOP MENU */
.menu-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.menu-row:last-child { border-bottom: none; }
.menu-rank {
  font-family: 'Prompt', sans-serif;
  font-size: 0.8rem; font-weight: 700;
  color: var(--dim);
  width: 20px; flex-shrink: 0;
}
.menu-rank.gold   { color: var(--gold); }
.menu-rank.silver { color: #8b9db5; }
.menu-rank.bronze { color: #cd7f32; }
.menu-name { flex: 1; font-size: 0.85rem; color: var(--text); }
.menu-bar-wrap {
  width: 80px;
  background: var(--surface2);
  border-radius: 4px;
  height: 6px;
  overflow: hidden;
}
.menu-bar-fill {
  height: 100%;
  background: var(--green);
  border-radius: 4px;
  transition: width 0.8s ease;
}
.menu-count {
  font-size: 0.78rem; color: var(--muted);
  min-width: 40px; text-align: right;
}

/* RECENT BILLS */
.bill-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  font-size: 0.82rem;
}
.bill-row:last-child { border-bottom: none; }
.bill-time { color: var(--muted); min-width: 45px; }
.bill-table { color: var(--text); flex: 1; }
.bill-amount {
  font-family: 'Prompt', sans-serif;
  font-weight: 700; color: var(--gold);
}
.bill-method {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 10px;
  min-width: 60px; text-align: center;
}
.bill-method.cash {
  background: rgba(63,185,80,0.12);
  color: var(--green);
  border: 1px solid rgba(63,185,80,0.3);
}
.bill-method.qr {
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  border: 1px solid rgba(88,166,255,0.3);
}

/* LOADING / EMPTY */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 0.85rem;
}
.loading .spin {
  display: inline-block;
  font-size: 2rem;
  animation: spin 1.5s linear infinite;
  margin-bottom: 10px;
}
.empty {
  text-align: center;
  padding: 30px;
  color: var(--dim);
  font-size: 0.82rem;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">🍲 Koiii POS</div>
    <span class="header-badge">📊 Dashboard</span>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate"></span>
    <a href="index.html" class="btn-back">← กลับ POS</a>
  </div>
</header>

<main>

  <!-- DATE FILTER -->
  <div class="date-filter">
    <label>ดูข้อมูลวันที่:</label>
    <input type="date" class="date-input" id="filterDate">
    <button class="btn-today" onclick="setToday()">วันนี้</button>
    <button class="btn-filter" onclick="loadData()">🔍 ดูข้อมูล</button>
  </div>

  <!-- STAT CARDS -->
  <div class="stat-grid">
    <div class="stat-card revenue">
      <div class="stat-icon">💰</div>
      <div class="stat-label">ยอดขายรวม</div>
      <div class="stat-value accent" id="statRevenue">—</div>
      <div class="stat-sub" id="statRevenueSub"></div>
    </div>
    <div class="stat-card bills">
      <div class="stat-icon">🧾</div>
      <div class="stat-label">จำนวนบิล</div>
      <div class="stat-value blue" id="statBills">—</div>
      <div class="stat-sub" id="statBillsSub"></div>
    </div>
    <div class="stat-card avg">
      <div class="stat-icon">📈</div>
      <div class="stat-label">เฉลี่ยต่อบิล</div>
      <div class="stat-value gold" id="statAvg">—</div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-card topitem">
      <div class="stat-icon">🏆</div>
      <div class="stat-label">เมนูขายดีสุด</div>
      <div class="stat-value green" id="statTopItem" style="font-size:1rem;line-height:1.4">—</div>
      <div class="stat-sub" id="statTopItemSub"></div>
    </div>
  </div>

  <!-- CHART + TOP MENU -->
  <div class="section-grid">

    <!-- ยอดขายรายชั่วโมง -->
    <div class="section-card">
      <div class="section-title">⏰ ยอดขายรายชั่วโมง</div>
      <div class="section-body">
        <div class="chart-wrap" id="hourlyChart">
          <div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>
        </div>
      </div>
    </div>

    <!-- เมนูขายดี -->
    <div class="section-card">
      <div class="section-title">🥇 เมนูขายดี Top 5</div>
      <div class="section-body" id="topMenuList">
        <div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>
      </div>
    </div>

  </div>

  <!-- รายการบิลล่าสุด -->
  <div class="section-card" style="margin-bottom:24px">
    <div class="section-title">📋 รายการบิลล่าสุด</div>
    <div class="section-body" id="recentBills">
      <div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>
    </div>
  </div>

</main>

<script>
// ============================================================
// ตั้งค่า URL ของ Google Apps Script
// (ใช้ URL เดียวกับที่ POS ส่งข้อมูลไป)
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbziGE6NDPk2ztrirPlMFueedesJKn0ANOzuTVyqwqZ7w5O6eXempqbMqLTggSEEhBf2/exec';

// ============================================================
// ตั้งค่าวันที่ default เป็นวันนี้
// ============================================================
function setToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('filterDate').value = `${yyyy}-${mm}-${dd}`;
}

// ============================================================
// แปลงวันที่จาก input (2026-03-18) เป็นรูปแบบ Sheets (18/03/2569)
// ============================================================
function toThaiDate(inputDate) {
  const [y, m, d] = inputDate.split('-');
  const thaiYear = parseInt(y) + 543;
  return `${d}/${m}/${thaiYear}`;
}

// ============================================================
// โหลดข้อมูลจาก Google Sheets ผ่าน Apps Script
// ============================================================
async function loadData() {
  const dateVal = document.getElementById('filterDate').value;
  if (!dateVal) { alert('กรุณาเลือกวันที่ก่อนครับ'); return; }

  const thaiDate = toThaiDate(dateVal);

  // แสดง loading
  document.getElementById('statRevenue').textContent = '...';
  document.getElementById('statBills').textContent = '...';
  document.getElementById('statAvg').textContent = '...';
  document.getElementById('statTopItem').textContent = '...';
  document.getElementById('hourlyChart').innerHTML = '<div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>';
  document.getElementById('topMenuList').innerHTML = '<div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>';
  document.getElementById('recentBills').innerHTML = '<div class="loading"><span class="spin">🍲</span><br>กำลังโหลด...</div>';

  try {
    const res = await fetch(`${SCRIPT_URL}?date=${encodeURIComponent(thaiDate)}`);
    const data = await res.json();
    renderDashboard(data, dateVal);
    document.getElementById('lastUpdate').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
  } catch(err) {
    console.error(err);
    document.getElementById('hourlyChart').innerHTML = '<div class="empty">❌ โหลดข้อมูลไม่ได้<br>ตรวจสอบการเชื่อมต่อ</div>';
  }
}

// ============================================================
// แสดงผลข้อมูลทั้งหมด
// ============================================================
function renderDashboard(rows, dateVal) {
  if (!rows || rows.length === 0) {
    document.getElementById('statRevenue').textContent = '฿0';
    document.getElementById('statBills').textContent = '0';
    document.getElementById('statAvg').textContent = '฿0';
    document.getElementById('statTopItem').textContent = '—';
    document.getElementById('hourlyChart').innerHTML = '<div class="empty">ไม่มีข้อมูลวันนี้</div>';
    document.getElementById('topMenuList').innerHTML = '<div class="empty">ไม่มีข้อมูล</div>';
    document.getElementById('recentBills').innerHTML = '<div class="empty">ไม่มีรายการ</div>';
    return;
  }

  // --- คำนวณ stat cards ---
  const totalRevenue = rows.reduce((s, r) => s + (parseFloat(r.total)||0), 0);
  const totalBills = rows.length;
  const avgBill = totalBills > 0 ? Math.round(totalRevenue / totalBills) : 0;

  document.getElementById('statRevenue').textContent = '฿' + totalRevenue.toLocaleString();
  document.getElementById('statRevenueSub').textContent = 'วันที่ ' + dateVal.split('-').reverse().join('/');
  document.getElementById('statBills').textContent = totalBills + ' บิล';
  const cashCount = rows.filter(r => r.payMethod === 'เงินสด').length;
  const qrCount   = rows.filter(r => r.payMethod === 'โอน/QR').length;
  document.getElementById('statBillsSub').textContent = `💵 ${cashCount}  📱 ${qrCount}`;
  document.getElementById('statAvg').textContent = '฿' + avgBill.toLocaleString();

  // --- เมนูขายดี ---
  const itemCount = {};
  rows.forEach(r => {
    if (!r.items) return;
    // แยกชามด้วย " | " แล้วแยกรายการด้วย ", "
    const bowls = r.items.split(' | ');
    bowls.forEach(bowl => {
      const items = bowl.replace(/^ชามที่\d+:\s*/, '').split(', ');
      items.forEach(item => {
        // ตัดชื่อสินค้าออกจาก "🥩 เนื้อวัว ฿99 x2 = ฿198"
        const nameMatch = item.match(/^[^\s]*\s([^\฿]+)/);
        if (nameMatch) {
          const name = nameMatch[1].trim();
          // ดึงจำนวนจาก "x2"
          const qtyMatch = item.match(/x(\d+)/);
          const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
          itemCount[name] = (itemCount[name] || 0) + qty;
        }
      });
    });
  });

  const sortedItems = Object.entries(itemCount).sort((a,b) => b[1]-a[1]);
  if (sortedItems.length > 0) {
    document.getElementById('statTopItem').textContent = sortedItems[0][0];
    document.getElementById('statTopItemSub').textContent = sortedItems[0][1] + ' ชิ้น/จาน';
  }

  // Top 5
  const maxCount = sortedItems[0] ? sortedItems[0][1] : 1;
  const rankClass = ['gold','silver','bronze','',''];
  const rankLabel = ['🥇','🥈','🥉','4','5'];
  const top5 = sortedItems.slice(0,5);
  if (top5.length === 0) {
    document.getElementById('topMenuList').innerHTML = '<div class="empty">ไม่มีข้อมูล</div>';
  } else {
    document.getElementById('topMenuList').innerHTML = top5.map((item,i) => `
      <div class="menu-row">
        <span class="menu-rank ${rankClass[i]}">${rankLabel[i]}</span>
        <span class="menu-name">${item[0]}</span>
        <div class="menu-bar-wrap">
          <div class="menu-bar-fill" style="width:${Math.round(item[1]/maxCount*100)}%"></div>
        </div>
        <span class="menu-count">${item[1]} ชิ้น</span>
      </div>
    `).join('');
  }

  // --- ยอดขายรายชั่วโมง ---
  const hourly = {};
  for (let h = 9; h <= 22; h++) hourly[h] = 0;
  rows.forEach(r => {
    if (!r.time) return;
    const h = parseInt(r.time.split(':')[0]);
    if (hourly[h] !== undefined) hourly[h] += parseFloat(r.total)||0;
  });

  const hours = Object.keys(hourly).map(Number);
  const maxVal = Math.max(...Object.values(hourly), 1);
  document.getElementById('hourlyChart').innerHTML = hours.map(h => `
    <div class="bar-col">
      <div class="bar" style="height:${Math.max(4, Math.round(hourly[h]/maxVal*100))}px">
        <div class="bar-tooltip">฿${hourly[h].toLocaleString()}</div>
      </div>
      <div class="bar-label">${h}</div>
    </div>
  `).join('');

  // --- รายการบิลล่าสุด ---
  const recent = [...rows].reverse().slice(0, 10);
  document.getElementById('recentBills').innerHTML = recent.map(r => `
    <div class="bill-row">
      <span class="bill-time">${r.time||'—'}</span>
      <span class="bill-table">${r.table||'—'}</span>
      <span class="bill-amount">฿${parseFloat(r.total||0).toLocaleString()}</span>
      <span class="bill-method ${r.payMethod==='เงินสด'?'cash':'qr'}">${r.payMethod||'—'}</span>
    </div>
  `).join('');
}

// ============================================================
// เริ่มต้น: ตั้งวันที่เป็นวันนี้แล้วโหลดเลย
// ============================================================
setToday();
loadData();
</script>
</body>
</html>
